<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Real-Time Cost</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <section class="header">
        <p class="eyebrow">YouTube Real-Time Cost</p>
        <h1>현실 남은 시간</h1>
      </section>

      <label class="toggle-card" for="enabled">
        <span>
          <strong>배속 기준 남은 시간 표시</strong>
          <small>유튜브 영상에서 현재 배속 기준 남은 시간을 보여줍니다.</small>
        </span>
        <input id="enabled" type="checkbox" role="switch">
        <span class="switch" aria-hidden="true"></span>
      </label>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
